{% if page.layout == "page" %}
    <link rel="shortcut icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">

	<link rel="stylesheet" href="https://ka-f.webawesome.com/webawesome@3.9.0/styles/webawesome.css" />
	<script type="module" src="https://ka-f.webawesome.com/webawesome@3.9.0/webawesome.loader.js"></script>

	<script type="module" src="{{ '/assets/js/my-combobox.js' | relative_url }}"></script>

    <script type="importmap">
    {
        "imports": {
            "data-latest-spec": "{{ site.baseurl }}/raw/data-latest-spec.js"
        }
    }
    </script>

	<script>
        window.SiteConfig = {
            baseUrl: "{{ site.baseurl }}",
            dataLatestUrl: "{{ '/raw/data-latest.min.json' | relative_url }}",
        };
        document.documentElement.classList.add('wa-dark');
    </script>
{% endif %}
